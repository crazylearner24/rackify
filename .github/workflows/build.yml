name: Build & Release Rackify (Windows + Android)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable

      - name: Install Flet (silent mode)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade flet flet-cli

      - name: Force Safe Environment (NO RICH UI)
        shell: cmd
        run: |
          chcp 65001
          set PYTHONUTF8=1
          set PYTHONIOENCODING=utf-8
          set FLET_CLI_NO_RICH=1

      - name: Build Windows App (LOG ONLY)
        shell: cmd
        run: |
          echo "Starting Windows build..."
          flet build windows
          echo "Windows build completed"

      - name: Create ZIP
        shell: cmd
        run: |
          powershell Compress-Archive -Path build/windows/**/Release/* -DestinationPath Rackify-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: Rackify-Windows.zip


  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade flet flet-cli

      - name: Build APK (LOG ONLY)
        run: |
          echo "Starting APK build..."
          flet build apk
          echo "APK build completed"

      - name: Find APK (DEBUG)
        run: |
          find . -name "*.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/**/*.apk
            build/apk/**/*.apk


  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android

      - name: Show files (DEBUG LOG)
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Rackify-Windows.zip
            **/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}