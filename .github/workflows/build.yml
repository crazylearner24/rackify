name: Build & Release Rackify (Windows + Android)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write


jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade flet flet-cli

      - name: Build Windows App
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          chcp 65001
          flet build windows

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rackify-Windows
          path: build/windows/**


  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade flet flet-cli

      - name: Build APK (LOG ONLY)
        run: |
          echo "Starting APK build..."
          flet build apk
          echo "APK build completed"

      - name: Find APK (DEBUG)
        run: |
          find . -name "*.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/**/*.apk
            build/apk/**/*.apk


  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android

      - name: Show files (DEBUG)
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Rackify-Windows.zip
            **/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}