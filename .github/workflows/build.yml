name: Build & Release Rackify (Windows + Android)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install --upgrade flet flet-cli

      - name: Fix Windows Encoding (CRITICAL)
        shell: pwsh
        run: |
          chcp 65001
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          $env:PYTHONUTF8="1"
          $env:PYTHONIOENCODING="utf-8"
          $env:FLET_CLI_NO_RICH="1"

      - name: Build Windows App
        run: |
          flet build windows

      - name: Create ZIP
        run: |
          Compress-Archive `
            -Path build/windows/**/Release/* `
            -DestinationPath Rackify-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: Rackify-Windows.zip


  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install --upgrade flet flet-cli

      - name: Build APK
        run: |
          flet build apk

      - name: Locate APK (DEBUG SAFE)
        run: |
          find . -name "*.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/**/*.apk
            build/apk/**/*.apk


  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android

      - name: List files (debug)
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Rackify-Windows.zip
            **/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}