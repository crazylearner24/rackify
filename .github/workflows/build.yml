name: Build & Release Rackify

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade flet flet-cli

      - name: Build Windows App
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          chcp 65001
          flet build windows

      - name: ZIP FULL Windows Build (NO OMISSION)
        run: |
          powershell Compress-Archive `
            -Path build/windows/** `
            -DestinationPath Rackify-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rackify-Windows
          path: Rackify-Windows.zip


  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade flet flet-cli

      - name: Build APK
        run: |
          flet build apk

      - name: ZIP FULL Android Build (NO OMISSION)
        run: |
          zip -r Rackify-Android.zip build/

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rackify-Android
          path: Rackify-Android.zip


  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Rackify-Windows

      - uses: actions/download-artifact@v4
        with:
          name: Rackify-Android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Rackify-Windows.zip
            Rackify-Android.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}